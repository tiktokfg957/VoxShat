<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxShat — свободный мессенджер</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Подключаем Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <!-- Экран входа/регистрации -->
        <div id="auth-screen" class="screen active">
            <div class="auth-container">
                <h1 class="logo">VoxShat</h1>
                <p class="tagline">Говори свободно</p>
                <input type="text" id="phone-input" placeholder="Номер телефона, например +79123456789">
                <input type="text" id="username-input" placeholder="Желаемый username (только при регистрации)">
                <input type="password" id="password-input" placeholder="Пароль">
                <div class="auth-buttons">
                    <button id="login-btn">Войти</button>
                    <button id="register-btn">Зарегистрироваться</button>
                </div>
                <div id="auth-error" class="error-message"></div>
            </div>
        </div>

        <!-- Основной интерфейс (чаты) -->
        <div id="main-screen" class="screen">
            <div id="sidebar">
                <div class="sidebar-header">
                    <h2 class="logo-small">VoxShat</h2>
                    <button id="logout-btn" title="Выйти"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <div class="profile-info">
                    <span class="phone-badge" id="user-phone"></span>
                    <span class="username-badge" id="user-username"></span>
                </div>
                <button id="new-chat-btn" class="new-chat-btn"><i class="fas fa-plus"></i> Новый чат</button>
                <div id="chats-list" class="chats-list"></div>
            </div>

            <div id="chat-area">
                <div id="chat-header" class="chat-header">
                    <span id="chat-partner"></span>
                </div>
                <div id="messages-container" class="messages-container"></div>
                <div id="message-input-area" class="message-input-area">
                    <input type="text" id="message-input" placeholder="Напишите сообщение..." disabled>
                    <button id="send-btn" disabled><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <!-- Модальное окно для поиска нового собеседника по username -->
        <div id="new-chat-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>Новый чат</h3>
                <input type="text" id="search-username" placeholder="Введите username собеседника">
                <button id="search-user-btn">Найти и начать чат</button>
                <div id="search-result" class="search-result"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
