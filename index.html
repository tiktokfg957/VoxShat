<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VoxShat – вход</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: linear-gradient(135deg, #1e2a3a, #0f1724); }
        .auth-container {
            max-width: 400px;
            margin: 80px auto;
            background: rgba(30, 40, 50, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tabs { display: flex; gap: 16px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 12px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: 600; color: #aaa; transition: 0.2s; border-radius: 40px; }
        .tab.active { color: #5e9bff; background: rgba(94,155,255,0.15); }
        .form { display: none; }
        .form.active { display: block; }
        input { width: 100%; padding: 14px; margin: 12px 0; background: #2a3a48; border: none; border-radius: 28px; color: white; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #5e9bff; border: none; border-radius: 40px; font-weight: bold; color: white; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #3f7be0; transform: scale(0.98); }
        .forgot { text-align: right; margin-top: 8px; font-size: 13px; color: #aaa; cursor: pointer; }
        .message { text-align: center; margin-top: 16px; font-size: 14px; color: #ffaa66; }
        hr { margin: 20px 0; border-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
<div class="auth-container" id="authContainer">
    <div class="tabs">
        <div class="tab active" data-tab="login">Вход</div>
        <div class="tab" data-tab="register">Регистрация</div>
    </div>

    <!-- Форма входа -->
    <div id="loginForm" class="form active">
        <input type="text" id="loginUsername" placeholder="Имя пользователя">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <div class="forgot" onclick="showRecovery()">Забыли пароль?</div>
        <div id="loginMessage" class="message"></div>
    </div>

    <!-- Форма регистрации -->
    <div id="registerForm" class="form">
        <input type="text" id="regUsername" placeholder="Имя пользователя">
        <input type="password" id="regPassword" placeholder="Пароль">
        <button onclick="register()">Зарегистрироваться</button>
        <div id="regMessage" class="message"></div>
    </div>

    <!-- Восстановление пароля (диалог) -->
    <div id="recoveryDialog" style="display:none; margin-top: 20px;">
        <input type="text" id="recoveryUsername" placeholder="Имя пользователя">
        <button onclick="recoverPassword()">Сбросить пароль</button>
        <div id="recoveryMessage" class="message"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
