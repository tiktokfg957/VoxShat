<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxShat – чаты</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="user-info" id="userInfo">
            <div class="user-avatar" id="userAvatar"></div>
            <div class="user-details">
                <div class="user-name" id="userDisplayName"></div>
                <div class="user-username">@<span id="userUsername"></span></div>
            </div>
            <div class="settings-icon" id="settingsIcon">⚙️</div>
        </div>
        <div class="search-bar"><input type="text" placeholder="Поиск" id="searchChats"></div>
        <div class="chats-list" id="chatsList"></div>
        <div class="bottom-menu">
            <button onclick="logout()">Выйти</button>
        </div>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="placeholder">Выберите чат</div>
    </div>
</div>

<!-- Модальное окно редактирования профиля -->
<div id="profileModal" class="modal" style="display:none">
    <div class="modal-content">
        <span class="close" onclick="closeProfileModal()">&times;</span>
        <h3>Редактировать профиль</h3>
        <div class="avatar-edit">
            <div class="current-avatar" id="modalAvatar"></div>
            <input type="file" id="avatarUpload" accept="image/*">
            <button onclick="uploadAvatar()">Загрузить аватар</button>
        </div>
        <label>Отображаемое имя:</label>
        <input type="text" id="editDisplayName" placeholder="Имя">
        <label>Новый пароль (оставьте пустым, если не менять):</label>
        <input type="password" id="editPassword" placeholder="Новый пароль">
        <button onclick="saveProfile()">Сохранить изменения</button>
        <div id="profileMessage" class="message"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
